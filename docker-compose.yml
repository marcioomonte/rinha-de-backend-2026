services:
  api-1:
    image: rinha2026-api:v0.3
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160MB"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/ready"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 30s

  api-2:
    image: rinha2026-api:v0.3
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "160MB"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/ready"]
      interval: 2s
      timeout: 1s
      retries: 30
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks: [rinha]
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "20MB"

networks:
  rinha:
    driver: bridge
